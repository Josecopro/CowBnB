name: cowbnb
description: A Flutter app for renting agricultural land.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # UI Components & Navigation
  cupertino_icons: ^1.0.2
  go_router: ^14.0.0
  cached_network_image: ^3.4.1
  
  # State Management
  provider: ^6.2.1
  riverpod: ^2.4.0
  
  # HTTP & API
  http: ^1.2.2
  dio: ^5.4.0
  
  # Firebase
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  
  # Local Storage & Persistence
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  
  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  equatable: ^2.0.5
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  
  # Image & Media
  image_picker: ^1.1.2
  video_player: ^2.8.1
  
  # Date & Time
  table_calendar: ^3.0.9
  
  # Animations
  animations: ^2.0.11
  
  # Notifications
  flutter_local_notifications: ^15.1.3
  
  # Logging & Monitoring
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  
  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.0
  
  # Testing
  mockito: ^5.4.4
  mocktail: ^1.0.0
  
  # Firebase Emulator Support
  firebase_core_platform_interface: ^5.0.0

flutter:
  uses-material-design: true
